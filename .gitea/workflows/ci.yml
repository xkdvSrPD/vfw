name: ci

on:
  push:
    branches:
      - main
      - master
  pull_request:

jobs:
  test-and-package:
    runs-on: ubuntu-latest
    permissions:
      code: read
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.24.0"
      - name: Install packaging deps
        run: sudo apt-get update && sudo apt-get install -y dpkg-dev build-essential
      - name: Test
        run: go test ./...
      - name: Race Test
        run: CGO_ENABLED=1 go test -race ./...
      - name: Build deb
        run: VERSION=0.0.0-ci-${GITHUB_SHA::7} ARCH=amd64 bash scripts/build-deb.sh
      - name: Build full deb
        run: VERSION=0.0.0-ci-${GITHUB_SHA::7} ARCH=amd64 FULL_BUILD=true bash scripts/build-deb.sh
      - name: Inspect packages
        run: |
          ls -lh dist
          sha256sum dist/*.deb
