name: release

on:
  push:
    tags:
      - "v*"

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      code: read
      releases: write
    env:
      TAG_NAME: ${{ github.ref_name }}
      GITEA_REPOSITORY: ${{ github.repository }}
      GITEA_API_URL: ${{ github.server_url }}/api/v1
      GITEA_TOKEN: ${{ secrets.GITEA_TOKEN }}
      TARGET_COMMITISH: ${{ github.sha }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.24.0"
      - name: Install packaging deps
        run: sudo apt-get update && sudo apt-get install -y dpkg-dev build-essential
      - name: Test
        run: go test ./...
      - name: Build deb
        run: VERSION="${TAG_NAME#v}" ARCH=amd64 bash scripts/build-deb.sh
      - name: Publish release
        run: ARTIFACT_PATH="$(ls dist/*.deb)" RELEASE_BODY="Automated release for ${TAG_NAME}" bash scripts/publish-release.sh
